name: Run Selected CI Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            hkp-frontend/package-lock.json

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31"

      - name: Prepare frontend dependencies
        working-directory: hkp-frontend
        run: npm install

      - name: Run hkp-rt tests
        working-directory: hkp-rt
        run: ./run-tests.sh

      - name: Run hkp-frontend demo boards test
        working-directory: hkp-frontend
        run: npm run test -- src/runtime/browser/tests/demo-boards.regression.test.tsx

      - name: Run hkp-frontend tests (excluding demo boards)
        working-directory: hkp-frontend
        env:
          CI: true
        run: npm run test -- --exclude src/runtime/browser/tests/demo-boards.regression.test.tsx
