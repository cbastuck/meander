name: Run Selected CI Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite;files,${{ github.workspace }}/.cache/vcpkg/binary,readwrite
      VCPKG_DOWNLOADS: ${{ github.workspace }}/.cache/vcpkg/downloads

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            hkp-frontend/package-lock.json

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31"

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/vcpkg/binary
            .cache/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('3rdparty/vcpkg.json', '3rdparty/vcpkg-triplets/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [[ "${n}" -ge "${attempts}" ]]; then
                return 1
              fi
              n=$((n + 1))
              sleep $((n * 2))
            done
          }

          mkdir -p .cache/vcpkg/binary .cache/vcpkg/downloads

          vcpkg_baseline="bba8b52f6dea74159bba855ef00376e588d6ea0a"
          if [[ ! -f 3rdparty/vcpkg/scripts/buildsystems/vcpkg.cmake ]]; then
            retry 5 git clone https://github.com/microsoft/vcpkg.git 3rdparty/vcpkg
          fi
          retry 5 git -C 3rdparty/vcpkg fetch origin "${vcpkg_baseline}"
          git -C 3rdparty/vcpkg checkout --force "${vcpkg_baseline}"
          retry 3 ./3rdparty/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [[ "${n}" -ge "${attempts}" ]]; then
                return 1
              fi
              n=$((n + 1))
              sleep $((n * 2))
            done
          }

          arch="$(uname -m)"
          if [[ "${arch}" == "arm64" ]]; then
            triplet="arm64-osx-release"
          else
            triplet="x64-osx-release"
          fi

          retry 3 ./3rdparty/vcpkg/vcpkg install \
            --x-manifest-root=3rdparty \
            --triplet="${triplet}"

      - name: Prepare frontend dependencies
        working-directory: hkp-frontend
        run: npm install

      - name: Run hkp-rt tests
        working-directory: hkp-rt
        run: ./run-tests.sh

      - name: Run hkp-frontend demo boards test
        working-directory: hkp-frontend
        run: npm run test -- src/runtime/browser/tests/demo-boards.regression.test.tsx

      - name: Run hkp-frontend tests (excluding demo boards)
        working-directory: hkp-frontend
        env:
          CI: true
        run: npm run test -- --exclude src/runtime/browser/tests/demo-boards.regression.test.tsx
